<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard – News Sentiment Radar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    /* Hide everything initially, show only spinner */
    #dashboardWrap > *:not(.initial-spinner) { display: none; }
    .initial-spinner {
      text-align: center;
      padding: 100px 20px;
      color: var(--text-sec);
      font-size: 14px;
    }
    .initial-spinner .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(245,176,66,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Refined Auth Gate styling */
    .auth-gate {
      max-width: 500px;
      margin: 60px auto;
      background: linear-gradient(135deg, var(--surface) 0%, rgba(17,19,23,0.8) 100%);
      border: 1px solid var(--border2);
      border-radius: 32px;
      padding: 48px 40px;
      text-align: center;
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .auth-gate-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      background: var(--gold-glow);
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
      border: 1px solid rgba(245,176,66,0.3);
    }
    .auth-gate h2 {
      font-size: 1.8rem;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .auth-gate p {
      color: var(--text-sec);
      margin-bottom: 32px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .auth-gate .btn-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .auth-gate .btn-primary {
      background: linear-gradient(135deg, var(--accent), #f5c075);
      color: #0a0c10;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(245,176,66,0.2);
    }
    .auth-gate .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(245,176,66,0.3);
    }
    .auth-gate .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 10px 26px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-gate .btn-secondary:hover {
      background: rgba(245,176,66,0.1);
      transform: translateY(-2px);
    }
    @media (max-width: 640px) {
      .auth-gate { margin: 30px 20px; padding: 32px 24px; }
      .auth-gate h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="sh-logo" href="index.html">
      <span class="sh-logo-text">Sentiment Radar</span>
    </a>
    <div class="sh-right" id="siteHeaderAuth"></div>
  </header>

  <div class="dashboard-wrap" id="dashboardWrap">
    <div class="initial-spinner" id="initialSpinner">
      <div class="spinner"></div>
      <div>Loading dashboard...</div>
    </div>

    <!-- AUTH GATE (hidden initially) -->
    <div id="authGate" class="auth-gate">
      <div class="auth-gate-icon">🔐</div>
      <h2>Welcome to Sentiment Radar</h2>
      <p>Unlock AI‑powered news sentiment, briefs, and drafts.<br>Sign in or create a free account to continue.</p>
      <div class="btn-group">
        <button class="btn-primary" onclick="openModal('register')">Create free account →</button>
        <button class="btn-secondary" onclick="openModal('login')">Sign in</button>
      </div>
      <div style="margin-top: 24px; font-size: 12px; color: var(--text-hint);">
        Free plan includes 50 monthly crawls • No credit card required
      </div>
    </div>

    <!-- MAIN DASHBOARD CONTENT (hidden initially) -->
    <div id="dashboardContent" style="display:none">
      <!-- same content as before – all panes, tabs, etc. -->
      <div id="dashboardError" class="error-msg" style="display:none"></div>
      <div class="usage-bar" id="usageBar" style="display:none">...</div>
      <div class="topbar">...</div>
      <div class="tabs">...</div>
      <div class="pane active" id="pane-news">...</div>
      <div class="pane" id="pane-keywords">...</div>
      <div class="pane" id="pane-briefs">...</div>
      <div class="pane" id="pane-draft">...</div>
      <div class="pane" id="pane-humanizer">...</div>
      <div class="pane" id="pane-settings">...</div>
      <div class="pane" id="pane-account">...</div>
    </div>
  </div>

  <!-- AUTH MODAL (unchanged) -->
  <div class="modal-backdrop" id="authModal">...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth-supabase.js"></script>
  <script src="dashboard.js"></script>
  <script>
    // Immediately render header based on cached session (synchronous)
    initAccountDropdown();
  </script>
</body>
</html>
