name: Deploy to Hostinger

on:
  push:
    branches:
      - basit
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync sshpass

      - name: Deploy to public_html
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?Missing SSH_HOST secret}"
          : "${SSH_PORT:?Missing SSH_PORT secret}"
          : "${SSH_USERNAME:?Missing SSH_USERNAME secret}"
          : "${SSH_PASSWORD:?Missing SSH_PASSWORD secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH secret}"

          export SSHPASS="$SSH_PASSWORD"

          sshpass -e rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".DS_Store" \
            --exclude "README.md" \
            -e "ssh -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            ./ "${SSH_USERNAME}@${SSH_HOST}:${DEPLOY_PATH}"
